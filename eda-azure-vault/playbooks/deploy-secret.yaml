---
- name: Fetch secret from Vault and write to host
  hosts: "{{ target_host }}"
  gather_facts: false
  become: true

  vars:
    secret_file: "/etc/demo_secret.txt"

  tasks:
    - name: Read secret from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ lookup('env', 'VAULT_ADDR') }}"
        token: "{{ lookup('env', 'VAULT_TOKEN') }}"
        path: "{{ vault_secret_path }}"
      register: vault_secret

    - name: Write secret to file
      copy:
        content: "{{ vault_secret.data.data | to_nice_json }}"
        dest: "{{ secret_file }}"
        owner: root
        group: root
        mode: "0600"
