---
- name: Handle Vault events and fetch Vault secret
  hosts: all
  sources:
    - ansible.eda.azure_service_bus:
        queue_name: vault-events
        conn_str: "{{ servicebus_connection_string }}"

  rules:
    - name: Log
      condition: true
      actions:
        - print_event:
            pretty: true

    - name: Vault event triggers Vault secret deployment
      condition:
        all:
          - event.data.event_type == "kv-v2/data-write"
          - event.data.event.metadata.modified == "true"
          - event.data.event.metadata.path == "secret/data/demo-secret"
      action:
        run_job_template:
          name: Demo Job Template
          organization: Vault EDA Demo
